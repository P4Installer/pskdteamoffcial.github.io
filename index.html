<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>P4Bank</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #1a1f26;
            --card-bg: #242c37;
            --accent-blue: #4086ce;
            --text-main: #ffffff;
            --text-hint: #708499;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--tg-theme-bg-color, var(--bg-color));
            color: var(--tg-theme-text-color, var(--text-main));
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Карточка профиля */
        .profile-card {
            background-color: var(--tg-theme-secondary-bg-color, var(--card-bg));
            width: 100%;
            max-width: 400px;
            border-radius: 16px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background-color: var(--accent-blue);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            color: white;
            overflow: hidden;
        }

        .avatar img { width: 100%; height: 100%; object-fit: cover; }

        .user-info h3 { margin: 0; font-size: 18px; }
        .user-info p { margin: 2px 0 0; color: var(--text-hint); font-size: 14px; }

        /* Синяя карточка баланса */
        .balance-card {
            background: linear-gradient(135deg, #4a90e2, #357abd);
            width: 100%;
            max-width: 400px;
            border-radius: 20px;
            padding: 30px 15px;
            text-align: center;
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            box-sizing: border-box;
        }

        .balance-card span { font-size: 14px; opacity: 0.8; text-transform: uppercase; letter-spacing: 1px; }
        .balance-value { font-size: 42px; font-weight: 800; margin: 10px 0; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .star-icon { color: #f3bc4c; font-size: 35px; }

        /* Секция ввода */
        .input-group {
            background-color: var(--tg-theme-secondary-bg-color, var(--card-bg));
            width: 100%;
            max-width: 400px;
            border-radius: 16px;
            padding: 20px;
            box-sizing: border-box;
        }

        label { display: block; margin-bottom: 12px; font-weight: 600; font-size: 15px; }

        input {
            width: 100%;
            background: #1c232d;
            border: 1px solid #303b4a;
            border-radius: 10px;
            padding: 12px;
            color: white;
            font-size: 18px;
            box-sizing: border-box;
            margin-bottom: 15px;
            outline: none;
        }

        button {
            width: 100%;
            background-color: var(--tg-theme-button-color, var(--accent-blue));
            color: var(--tg-theme-button-text-color, white);
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:active { opacity: 0.8; }

        .footer { margin-top: auto; padding: 20px; color: var(--text-hint); font-size: 13px; }
    </style>
</head>
<body>

    <div class="profile-card">
        <div class="avatar" id="user-avatar">?</div>
        <div class="user-info">
            <h3 id="user-name">Загрузка...</h3>
            <p id="user-id">ID: 00000000</p>
        </div>
    </div>

    <div class="balance-card">
        <span>Ваш счет XTR</span>
        <div class="balance-value">
            <span id="balance">0</span>
            <span class="star-icon">⭐</span>
        </div>
    </div>

    <div class="input-group">
        <label>Пополнить счет</label>
        <input type="number" id="amount" placeholder="Количество звезд" min="1">
        <button onclick="sendData()">Купить ⭐</button>
    </div>

    <div class="footer">@P4BankBot</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Загрузка данных профиля
        const user = tg.initDataUnsafe?.user;
        
        if (user) {
            document.getElementById('user-name').innerText = user.first_name + (user.last_name ? ' ' + user.last_name : '');
            document.getElementById('user-id').innerText = 'ID: ' + user.id;
            
            if (user.photo_url) {
                document.getElementById('user-avatar').innerHTML = `<img src="${user.photo_url}">`;
            } else {
                document.getElementById('user-avatar').innerText = user.first_name[0];
            }
        }

        function sendData() {
            const val = document.getElementById('amount').value;
            if (val > 0) {
                tg.sendData(JSON.stringify({action: 'deposit', amount: parseInt(val)}));
            } else {
                tg.showAlert("Введите сумму!");
            }
        }
    </script>
</body>
</html>
