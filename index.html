<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>P4Bank</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #13171c; --text: #ffffff; --accent: #248bfe;
            --sec-bg: #1c232d; --hint: #8b96a3; --card-border: rgba(255, 255, 255, 0.08);
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .tabs { display: flex; background: var(--sec-bg); padding: 4px; border-radius: 14px; margin-bottom: 20px; }
        .tab { flex: 1; padding: 10px; text-align: center; border-radius: 10px; cursor: pointer; font-size: 14px; }
        .tab.active { background: var(--bg); color: var(--accent); }
        .content { display: none; }
        .content.active { display: block; }
        .balance-card { text-align: center; padding: 40px 20px; background: linear-gradient(135deg, rgba(36,139,254,0.15), rgba(36,139,254,0.05)); border-radius: 24px; border: 1px solid var(--card-border); }
        .balance-val { font-size: 48px; font-weight: 800; }
        .star { color: #f3bc4c; }
        .card { background: var(--sec-bg); padding: 18px; border-radius: 18px; margin-bottom: 15px; border: 1px solid var(--card-border); }
        .gift-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .gift-card { background: var(--bg); border: 1px solid var(--card-border); padding: 15px; border-radius: 16px; text-align: center; }
        .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; }
        .stars-btn { background: #f3bc4c; color: #000; }
    </style>
</head>
<body>
    <div class="tabs">
        <div class="tab active" onclick="switchTab('main')">Кошелек</div>
        <div class="tab" onclick="switchTab('deposit')">Пополнить</div>
        <div class="tab" onclick="switchTab('shop')">Магазин</div>
    </div>

    <div id="main" class="content active">
        <div class="balance-card">
            <div style="color: var(--hint); font-size: 12px;">ДОСТУПНО</div>
            <div class="balance-val" id="user_balance">... <span class="star">⭐</span></div>
        </div>
    </div>

    <div id="shop" class="content">
        <div class="gift-grid">
            <div class="gift-card" onclick="buyGift('ny_bear')">🧸 55 ⭐</div>
            <div class="gift-card" onclick="buyGift('tree')">🎄 55 ⭐</div>
            <div class="gift-card" onclick="buyGift('love_bear')">❤️ 55 ⭐</div>
            <div class="gift-card" onclick="buyGift('love_heart')">💝 55 ⭐</div>
            <div class="gift-card" onclick="buyGift('girl_bear')">🎀 55 ⭐</div>
        </div>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    function updateBalanceFromUrl() {
        // Читаем параметры из ссылки
        const urlParams = new URLSearchParams(window.location.search);
        const balance = urlParams.get('balance');
        
        if (balance !== null) {
            document.getElementById('user_balance').innerHTML = `${balance} <span class="star">⭐</span>`;
        } else {
            document.getElementById('user_balance').innerHTML = `0 <span class="star">⭐</span>`;
        }
    }

    // Запускаем при открытии
    updateBalanceFromUrl();

    function switchTab(id) {
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
        tg.HapticFeedback.impactOccurred('light');
        // При переключении вкладок баланс остается прежним
    }

    function buyGift(giftId) {
        tg.showConfirm("Купить за 55 ⭐?", (ok) => {
            if (ok) {
                tg.sendData(JSON.stringify({type: 'withdraw_gift', id: giftId}));
                tg.close();
            }
        });
    }
</script>
</body>
</html>
