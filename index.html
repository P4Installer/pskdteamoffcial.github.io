<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>P4Bank</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #13171c; --text: #fff; --accent: #248bfe; --sec: #1c232d; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .tabs { display: flex; background: var(--sec); padding: 4px; border-radius: 14px; margin-bottom: 20px; }
        .tab { flex: 1; padding: 10px; text-align: center; border-radius: 10px; cursor: pointer; }
        .tab.active { background: var(--bg); color: var(--accent); }
        .content { display: none; }
        .content.active { display: block; }
        .balance-card { text-align: center; padding: 40px 20px; background: rgba(36,139,254,0.1); border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); }
        .balance-val { font-size: 48px; font-weight: 800; }
        .gift-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .gift-card { background: var(--sec); padding: 15px; border-radius: 16px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="tabs">
        <div class="tab active" onclick="switchTab('main')">Банк</div>
        <div class="tab" onclick="switchTab('shop')">Магазин</div>
    </div>

    <div id="main" class="content active">
        <div class="balance-card">
            <div style="color: #8b96a3; font-size: 12px;">МОЙ БАЛАНС</div>
            <div class="balance-val" id="user_balance">... ⭐</div>
        </div>
    </div>

    <div id="shop" class="content">
        <div class="gift-grid">
            <div class="gift-card" onclick="buyGift('ny_bear')">🧸 Мишка 55⭐</div>
            <div class="gift-card" onclick="buyGift('tree')">🎄 Елка 55⭐</div>
            <div class="gift-card" onclick="buyGift('love_bear')">❤️ Мишка 55⭐</div>
            <div class="gift-card" onclick="buyGift('love_heart')">💝 Сердце 55⭐</div>
            <div class="gift-card" onclick="buyGift('girl_bear')">🎀 Мишка 55⭐</div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const userId = tg.initDataUnsafe.user.id;

        async function fetchBalance() {
            try {
                const res = await fetch(`/api/balance/${userId}`);
                const data = await res.json();
                document.getElementById('user_balance').innerText = data.balance + " ⭐";
            } catch (e) { console.log(e); }
        }
        fetchBalance();

        function switchTab(id) {
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
            if(id === 'main') fetchBalance();
        }

        function buyGift(giftId) {
            tg.showConfirm("Купить подарок за 55 ⭐?", (ok) => {
                if(ok) {
                    tg.sendData(JSON.stringify({type: 'withdraw_gift', id: giftId}));
                    tg.close();
                }
            });
        }
    </script>
</body>
</html>
